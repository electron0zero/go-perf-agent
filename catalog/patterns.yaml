# go-perf-agent pattern catalog
#
# Sources:
#   Dave Cheney's high-performance-go-workshop and Bryan Boreham's fork
#     https://dave.cheney.net/high-performance-go-workshop/dotgo-paris.html
#     https://github.com/bboreham/high-performance-go-workshop
#   Go standard library docs (strconv, regexp, encoding/binary, sort/slices) via `go doc`
#   Go GC guide  https://go.dev/doc/gc-guide
#   Go wiki: CompilerOptimizations  https://go.dev/wiki/CompilerOptimizations
#   Go wiki: Performance  https://go.dev/wiki/Performance
#   Profiling Go Programs (pprof blog)  https://go.dev/blog/pprof
#   go-optimization-guide (concurrency/memory patterns)  https://goperf.dev/
#   go-perfbook (optimization hierarchy + Go tips)  https://github.com/dgryski/go-perfbook
#   Guide to the Go GC  https://go.dev/doc/gc-guide
#
# Each pattern is a hypothesis template. A hotspot (hot function / allocation site / slow
# span) is matched against these. `detect` heuristics pre-filter source sites
# deterministically; the LLM only justifies/ranks among pre-filtered candidates.
#
# This catalog is the implementation/micro tier of the optimization hierarchy. Big wins come
# first from a better algorithm or data structure, or from doing the work fewer times - so for
# each hotspot first ask "can this work be eliminated, cached, or called less often?" (see
# hoist-call-out-of-loop / single-item-cache) before reaching for a constant-factor transform.
# Every transform also codifies an assumption about the data: validation must document it and
# test the path where it does not hold (go-perfbook).
#
# Axis note: a `gc` proof is GC CPU / mark-scan time and live scannable-heap size, NOT ns/op - a
# plain bench will not show it; it needs a force-GC benchmark (runtime.GC loop / ReadMemStats /
# GODEBUG=gctrace). GOGC and GOMEMLIMIT are deployment config, never catalog patterns: they
# cannot be proved by a microbench (validate against the production heap profile instead).
#
# Fields:
#   id          stable slug
#   kind        code (default) | workload   (see below)
#   title       human name
#   optimizes   cpu | allocs | bytes | latency | gc   (the benchstat metric that should move)
#   signal      what telemetry symptom makes this pattern plausible
#   detect      grep-style regexes (any-match) that flag candidate source sites; [] = needs LLM
#   transform   the one change to try
#   benchmark   what the benchmark must exercise to prove it
#   confidence  prior likelihood the change helps when the signal is present (low|med|high)
#   risk        correctness risk of the transform (low|med|high)
#
# kind: most patterns are `code` - a source transform the benchstat gate proves/rejects. A
# `workload` pattern is different: the bottleneck is the request/query SHAPE, not the code. It is
# detected from telemetry (the slow trace's attributes - the query/filter, endpoint, request
# fan-out), NOT a source regex, and the benchstat gate CANNOT validate it (there is no code change).
# The analyst emits a workload finding as ADVISORY - it goes straight into the report with the
# evidence and the suggested query/config fix; it is never run through bench-baseline/bench-verdict.

version: 1
patterns:
  - id: slice-prealloc
    title: Preallocate slices with known capacity
    optimizes: allocs
    signal: growslice / runtime.makeslice / append hot in alloc profile
    detect:
      - '\bappend\([a-zA-Z_][a-zA-Z0-9_]*,'
      - 'make\(\[\][^,]+\)\s*$'
    transform: "make([]T, 0, n) with n derived from a known length, before the append loop"
    benchmark: build the slice at a representative size; measure B/op and allocs/op
    confidence: high
    risk: low

  - id: slice-reuse
    title: Reuse a slice across loop iterations instead of reallocating
    optimizes: allocs
    signal: growslice / runtime.makeslice hot in a loop that builds a fresh slice each iteration
    detect:
      - 'make\(\[\][^,]+,'
    transform: "hoist the slice above the loop and reset it with s = s[:0] each pass, instead of
      make()-ing a new one per iteration (keeps the backing array)"
    benchmark: loop that rebuilds the slice, reuse vs make-each-iter; measure B/op and allocs/op
    confidence: high
    risk: low

  - id: map-prealloc
    title: Preallocate maps with size hint
    optimizes: allocs
    signal: runtime.mapassign / hashGrow hot in profile
    detect:
      - 'make\(map\['
    transform: "make(map[K]V, n) with a size hint"
    benchmark: populate the map at a representative size; measure allocs/op
    confidence: med
    risk: low

  - id: string-builder
    title: Replace + concatenation with strings.Builder
    optimizes: allocs
    signal: runtime.concatstrings / many small string allocs
    detect:
      - '\+=\s*"'
      - '[a-zA-Z0-9_]\s*\+=\s*[a-zA-Z_].*\bstring'
    transform: "accumulate into strings.Builder (Grow if size known), or bytes.Buffer"
    benchmark: build the string in a loop; measure B/op and allocs/op
    confidence: high
    risk: low

  - id: byte-string-conv
    title: Avoid repeated []byte<->string conversions
    optimizes: allocs
    signal: runtime.slicebytetostring / stringtoslicebyte hot
    detect:
      - 'string\(\[\]byte'
      - '\[\]byte\(.*string'
      - 'string\([a-zA-Z_][a-zA-Z0-9_]*\)'
    transform: "keep one representation across the hot path; use the compiler's special-cased
      forms (string(b) in map key / comparison does not allocate)"
    benchmark: exercise the conversion site at scale; measure allocs/op
    confidence: med
    risk: med

  - id: sync-pool
    title: Recycle large/temporary objects with sync.Pool
    optimizes: gc
    signal: high alloc rate of fixed-size buffers; GC CPU significant
    detect: []   # needs LLM: only worth it for hot, short-lived, fixed-size allocations
    transform: "pool the buffer/object; Get/Put around the work, reset on Put"
    benchmark: concurrent reuse at representative size; measure B/op, allocs/op, and GC
    confidence: med
    risk: high

  - id: struct-field-align
    title: Reorder struct fields (padding, cache line, GC scan)
    optimizes: bytes
    signal: large count of a struct in heap; mixed-width fields out of order; or a hot struct >64B
      where only a few fields are touched; or a bulk-retained struct with pointers scattered late
    detect: []   # needs struct layout analysis, not regex
    transform: "reorder the fields once, optimizing for the live driver: largest-to-smallest
      alignment to remove padding (bytes); hottest fields within the first 64 bytes so one
      cache-line fetch serves the common access (cpu); pointer fields first, since the GC stops
      scanning a value at its last pointer (gc). One change, possibly several wins"
    benchmark: allocate/scan N of the struct at a representative size; measure B/op (padding),
      ns/op at sizes exceeding cache (locality), or GC mark CPU on a live heap (scan). Assert
      offsets with unsafe.Offsetof/Sizeof in a test
    confidence: med
    risk: low

  - id: range-copy
    title: Avoid copying large structs in range loops
    optimizes: cpu
    signal: duffcopy / large memmove hot in a range loop
    detect:
      - 'for\s+[a-zA-Z_, ]+:?=\s*range\b'
    transform: "range over index, or use a pointer slice, to avoid per-iteration struct copy"
    benchmark: range a slice of large structs; measure ns/op
    confidence: med
    risk: low

  - id: bounds-check-elim
    title: Help the compiler eliminate bounds checks
    optimizes: cpu
    signal: runtime.panicIndex / repeated bounds checks in a tight loop (asm shows CMP/JMP)
    detect: []   # needs -gcflags=-d=ssa/check_bce or asm inspection
    transform: "hoist a length check (e.g. `_ = b[n-1]`) or reslice once so indices are proven safe"
    benchmark: tight indexed loop over a slice; measure ns/op
    confidence: low
    risk: low

  - id: inline-small-fn
    title: Keep hot leaf functions inlineable
    optimizes: cpu
    signal: function-call overhead dominates a tiny hot function (seen in CPU profile)
    detect: []   # needs `go build -gcflags=-m` inlining report
    transform: "shrink the function under the inlining budget, or remove the call in the hot path"
    benchmark: call the function in a tight loop; measure ns/op
    confidence: low
    risk: low

  - id: escape-to-stack
    title: Keep allocations on the stack (avoid escape)
    optimizes: allocs
    signal: heap alloc of values that look local; `-gcflags=-m` shows "escapes to heap"
    detect: []   # needs escape analysis report
    transform: "avoid taking address / passing to interface that forces heap; return value not pointer"
    benchmark: call the allocating function in a loop; measure allocs/op
    confidence: med
    risk: med

  - id: reflection-hot-path
    title: Remove reflection from hot paths
    optimizes: cpu
    signal: reflect.Value.* hot in CPU profile
    detect:
      - 'reflect\.'
      - 'encoding/json'
    transform: "replace reflection with generated code or concrete-type fast path"
    benchmark: the encode/decode/dispatch op; measure ns/op
    confidence: med
    risk: high

  - id: buffered-io
    title: Buffer small reads/writes
    optimizes: latency
    signal: syscall.read/write hot; many small I/O ops in trace spans
    detect:
      - '\.Read\('
      - '\.Write\('
    transform: "wrap in bufio.Reader/Writer to batch syscalls"
    benchmark: stream through the reader/writer; measure ns/op and syscall count
    confidence: med
    risk: low

  - id: lock-sharding
    title: Shard a hot lock to cut contention
    optimizes: latency
    signal: sync.(*Mutex).Lock hot in block/mutex profile; serialized spans in traces on a single
      shared lock
    detect:
      - 'sync\.(Mutex|RWMutex)'
      - '\.Lock\(\)'
    transform: "stripe the one lock into N shards keyed by hash(item)%N (or shrink the critical
      section so the lock is held for less), so independent work no longer serializes"
    benchmark: b.RunParallel hitting the lock from many goroutines, single vs sharded; measure ns/op under -cpu
    confidence: med
    risk: high
    # see atomic-counter (single counter/flag) and cow-atomic-config (read-mostly) for those cases

  - id: rwmutex-read-heavy
    title: Switch a read-heavy Mutex to RWMutex
    optimizes: latency
    signal: sync.(*Mutex).Lock hot under a workload that is overwhelmingly reads with rare writes
    detect:
      - 'sync\.Mutex'
      - '\.Lock\(\)'
    transform: "replace sync.Mutex with sync.RWMutex and take RLock on the read paths so readers
      run concurrently; keep Lock only for the writes"
    benchmark: b.RunParallel read-heavy mix (small write %), Mutex vs RWMutex; measure ns/op under -cpu
    confidence: med
    risk: med   # RWMutex has higher fixed cost; a wrong read/write split can be slower than Mutex

  - id: defer-hot-loop
    title: Hoist defer out of hot loops
    optimizes: cpu
    signal: runtime.deferproc/deferreturn measurable in a hot, high-iteration function
    detect:
      - '\bdefer\b'
    transform: "call cleanup directly at the end of the hot loop body instead of defer"
    benchmark: loop with the deferred call; measure ns/op
    confidence: low
    risk: med

  # --- additions grounded in Go stdlib docs / GC guide ---

  - id: fmt-to-strconv
    title: Use strconv instead of fmt for scalar formatting
    optimizes: allocs
    signal: fmt.(*pp) / reflect hot in cpu profile; fmt.Sprintf used to format numbers/bools
    detect:
      - 'fmt\.Sprint(f|ln)?\('
    transform: "format scalars with strconv (Itoa/FormatInt/FormatFloat), or strconv.Append* into
      a reused []byte, instead of fmt.Sprintf which reflects over its args and allocates"
    benchmark: format the value in a tight loop; measure ns/op and allocs/op
    confidence: high
    risk: low

  - id: regexp-compile-once
    title: Compile regexps once, not per call
    optimizes: cpu
    signal: regexp.Compile / syntax.Parse / regexp.MatchString hot in cpu+alloc profile
    detect:
      - 'regexp\.Must?Compile\('
      - 'regexp\.Match(String)?\('
    transform: "hoist regexp.MustCompile to a package-level var and reuse the *Regexp; never compile
      inside the hot path (regexp.MatchString recompiles the pattern on every call)"
    benchmark: run the match in a loop, compiled-once vs per-call; measure ns/op and allocs/op
    confidence: high
    risk: low

  - id: binary-read-reflection
    title: Decode fixed layouts without encoding/binary reflection
    optimizes: cpu
    signal: encoding/binary.Read|Write and reflect.* hot when (de)serializing fixed-size records
    detect:
      - 'binary\.(Read|Write)\('
    transform: "replace binary.Read/Write (they reflect over `any`) with the ByteOrder helpers
      (binary.LittleEndian.Uint64 etc) over a []byte"
    benchmark: decode/encode the record in a loop; measure ns/op and allocs/op
    confidence: med
    risk: med

  - id: sort-reflection
    title: Use generic slices.Sort over reflection-based sort.Slice
    optimizes: cpu
    signal: reflect.Swapper / sort.Slice closures hot in cpu profile
    detect:
      - 'sort\.(Slice|SliceStable|Sort)\('
    transform: "use slices.SortFunc/SortStableFunc (generic, no reflection) instead of sort.Slice
      (takes `any`, swaps via reflect.Swapper) / sort.Sort (interface dispatch per compare)"
    benchmark: sort a representative slice in a loop; measure ns/op
    confidence: med
    risk: low

  - id: interface-boxing
    title: Avoid boxing scalars into interface{} on the hot path
    optimizes: allocs
    signal: runtime.convT64 / convTstring / convTslice hot in alloc profile
    detect:
      - '\[\]any\b'
      - '\[\]interface\{\}'
    transform: "stop converting non-pointer values to any/interface{} in the hot path (each
      conversion can heap-allocate); use concrete types or generics, or store pointers"
    benchmark: the boxing site in a loop; measure allocs/op
    confidence: med
    risk: med

  - id: reduce-pointers-gc
    title: Reduce pointers in large/long-lived structures
    optimizes: gc
    signal: runtime.scanobject / GC mark CPU significant; pointer-heavy structs, maps, or graphs
      held live in bulk
    detect:
      - 'map\[string\]'
      - 'map\[\*'
    transform: "make bulk-retained data pointer-free so the GC skips it: indices instead of *T,
      value fields, []T over []*T, an index-backed []Node graph instead of *Node chasing, and
      fixed-width int/array map keys instead of string/*T - the GC does not scan pointer-free
      memory and stops at a value's last pointer (see the GC guide)"
    benchmark: hold N of the structure live and force GC; measure GC CPU/pause (or pointer count)
    confidence: med
    risk: med

  - id: map-clear-reuse
    title: Reuse a map with clear() instead of reallocating each pass
    optimizes: allocs
    signal: runtime.makemap hot in a loop that rebuilds a map every iteration
    detect:
      - 'make\(map\['
    transform: "allocate the map once outside the loop and clear() it each iteration (Go 1.21+)
      rather than make()-ing a fresh map every pass"
    benchmark: loop that rebuilds the map, clear-reuse vs make-each-iter; measure allocs/op
    confidence: med
    risk: low

  # --- additions from go.dev/wiki/Performance (profiling guide + Profiling Go Programs blog) ---

  - id: map-to-slice-index
    title: Replace small-integer/pointer-keyed maps with index-addressed slices
    optimizes: cpu
    signal: runtime.mapaccess1_fast64 / mapaccess2 / mapassign hot in cpu profile; a map keyed by a
      dense small int or a *T that has (or can get) a dense ordinal
    detect:
      - 'map\[(int|int32|int64|uint|uint32|uint64)\]'
      - 'map\[\*[A-Z][A-Za-z0-9_]*\]'
    transform: "if keys are (or map to) a dense 0..N-1 range, replace the map with a []V indexed by
      that ordinal; carry the ordinal on the element instead of hashing"
    benchmark: build then do N lookups, map vs indexed slice, at representative size; measure ns/op
    confidence: high
    risk: med

  - id: coalesce-allocs-struct
    title: Combine several small heap allocations into one
    optimizes: allocs
    signal: many small malloc sites for related objects allocated together (alloc_objects high,
      mallocgc hot); per-iteration closure / goroutine captures
    detect: []   # needs LLM: must see that N allocs share a lifetime and can merge
    transform: "merge co-allocated values into one struct (one alloc), or embed a value member
      instead of a pointer member (bytes.Buffer not *bytes.Buffer); for loop captures, pack the
      captured vars into one struct literal per iteration"
    benchmark: run the allocating section in a loop; measure allocs/op and B/op
    confidence: med
    risk: low

  - id: small-buf-on-struct
    title: Inline a fixed-size array buffer on the struct to avoid heap allocation
    optimizes: allocs
    signal: makeslice / mallocgc hot for a small []byte (or []T) that is usually below a known small
      bound and is owned by a struct
    detect:
      - 'make\(\[\]byte,'
    transform: "add a fixed array field (e.g. bufArray [16]byte) and init the slice as
      x.buf = x.bufArray[:0]; the common small case then needs no heap allocation"
    benchmark: allocate the owning struct and fill the buffer to the common size; measure allocs/op
    confidence: med
    risk: low

  - id: buffered-channel
    title: Buffer channels to recover parallelism
    optimizes: latency
    signal: chan send/recv blocking hot in block profile; producer and consumer ping-pong with low
      throughput; unbuffered channel in a hot pipeline
    detect:
      - 'make\(chan\s'
    transform: "give the channel a buffer sized to decouple producer/consumer (or batch sends into a
      fixed-size array before sending) so neither side stalls per item"
    benchmark: producer/consumer pipeline, unbuffered vs buffered, b.RunParallel; measure ns/op and throughput
    confidence: low
    risk: med   # buffer sizing is workload-dependent and can mask backpressure bugs

  # --- additions from goperf.dev (go-optimization-guide): concurrency + memory ---

  - id: cow-atomic-config
    title: Serve read-mostly shared state via an atomic snapshot instead of RWMutex
    optimizes: latency
    signal: sync.(*RWMutex).RLock hot on a read-heavy, rarely-written config / routing / lookup
      path; reader contention in block/mutex profile or traces
    detect:
      - 'sync\.RWMutex'
      - 'atomic\.(Value|Pointer)'
    transform: "store an immutable *T behind atomic.Pointer[T] (or atomic.Value); readers Load() a
      snapshot lock-free; writers build a fresh copy (copy-on-write) and Store() it"
    benchmark: b.RunParallel read-mostly with a small write %, atomic vs RWMutex; measure ns/op under -cpu
    confidence: med
    risk: high   # readers must treat the snapshot as immutable; writer must not mutate in place

  - id: atomic-counter
    title: Replace a mutex-guarded counter/flag with sync/atomic
    optimizes: latency
    signal: sync.(*Mutex).Lock hot in mutex/block profile around a single counter or boolean
    detect:
      - '\.Lock\(\)'
    transform: "use atomic.Int64.Add / atomic.Bool.Store|Load for a single-variable counter or flag;
      keep the mutex only for genuine multi-step critical sections"
    benchmark: b.RunParallel incrementing/reading, atomic vs mutex; measure ns/op under -cpu
    confidence: med
    risk: med

  - id: bounded-worker-pool
    title: Replace per-task goroutines with a bounded worker pool
    optimizes: latency
    signal: runtime.newproc / schedule / morestack hot; goroutine count tracks request/item volume;
      scheduler + GC CPU rise under load
    detect:
      - 'go\s+func\s*\('
    transform: "feed work through a buffered jobs channel consumed by a fixed pool (size
      runtime.NumCPU() for CPU-bound, higher for I/O-bound), or cap fan-out with
      errgroup.Group.SetLimit / a semaphore channel, instead of one goroutine per task"
    benchmark: b.RunParallel feeding N tasks, pool vs goroutine-per-task; measure ns/op, allocs/op, peak goroutines
    confidence: med
    risk: high   # changes ordering, backpressure, and error-propagation semantics

  - id: batch-ops
    title: Batch small repeated I/O / RPC / DB ops into one
    optimizes: latency
    signal: many small syscall.write / RPC / DB-exec spans in traces; fixed per-op overhead
      dominates; high op count, low per-op payload
    detect: []   # needs LLM/trace: per-op fixed cost, items independent, caller tolerates flush delay
    transform: "accumulate items and flush in one call on a size-or-time threshold (single multi-row
      insert, batched WriteString, one io.Writer flush) instead of one call per item"
    benchmark: process N items, per-item vs batched flush; measure ns/op, allocs/op, op/syscall count
    confidence: med
    risk: high   # changes durability/latency: buffered items can be lost on crash before flush

  - id: stream-copybuffer
    title: Stream with a reused buffer instead of materializing whole payloads
    optimizes: allocs
    signal: io.ReadAll / large make([]byte,...) per request hot in alloc profile; whole-body
      buffering before processing
    detect:
      - 'io\.ReadAll\('
      - 'ioutil\.ReadAll\('
    transform: "stream via io.CopyBuffer(dst, src, buf) with a reused (or pooled) []byte, or process
      incrementally, instead of reading the entire payload into memory"
    benchmark: copy/transform a representative payload, ReadAll vs CopyBuffer; measure B/op and allocs/op
    confidence: med
    risk: med

  - id: false-sharing-pad
    title: Pad concurrently-written fields onto separate cache lines
    optimizes: cpu
    signal: high CPU on a tight parallel loop writing adjacent struct/array fields from different
      goroutines; gains appear only at -cpu>1, not single-threaded
    detect: []   # needs layout + concurrency analysis: which fields are written by which goroutine
    transform: "separate per-goroutine hot fields onto distinct 64-byte cache lines with padding
      (e.g. _ [64]byte between fields, or a per-shard struct in its own cache line)"
    benchmark: b.RunParallel writing the fields from multiple goroutines, padded vs unpadded; measure ns/op at -cpu=NumCPU
    confidence: low
    risk: low

  - id: once-value
    title: Use sync.OnceValue/OnceValues for lazy one-time init
    optimizes: latency
    signal: expensive init (compile, load, parse) run eagerly at startup or repeated; a manual
      sync.Once + var / double-checked-lock idiom on a first-use path
    detect:
      - 'sync\.Once\b'
    transform: "replace manual sync.Once + package var (or hand-rolled double-checked locking) with
      sync.OnceValue / sync.OnceValues (Go 1.21+) to lazily compute once on first use"
    benchmark: concurrent first-use + steady-state Get, OnceValue vs manual Once; measure ns/op
    confidence: low
    risk: low

  # --- additions from go-perfbook (Damian Gryski): the implementation/micro tier; large wins
  # --- come first from a better algorithm or doing the work fewer times (see header note) ---

  - id: hoist-call-out-of-loop
    title: Reduce a hot routine's call count instead of optimizing its body
    optimizes: cpu
    signal: a routine is high in CUMULATIVE profile time from call count, not self-time-per-call
      (cheap body, called too often)
    detect: []   # needs profile call-count vs self-time, not regex
    transform: "lift a loop-invariant call out of the loop and reuse its result, or batch inputs so
      it runs once over N items instead of N times - the fastest work is work not done"
    benchmark: loop calling per-iteration vs hoisted/batched over a representative N; measure ns/op
    confidence: high
    risk: low

  - id: single-item-cache
    title: Memoize the most-recent result of a hot pure function
    optimizes: cpu
    signal: one expensive deterministic function dominates cpu profile and is called repeatedly
      with temporally-clustered identical args (e.g. time.Parse per log line)
    detect: []   # needs LLM: function must be pure and inputs temporally clustered
    transform: "cache the last (input,output) pair on a package/struct field; on call, return the
      cached output when the input matches, else compute and store. Single slot, no eviction.
      Document the locality assumption"
    benchmark: drive with a production-representative key stream (clustered, not uniform) at a
      realistic hit ratio, plus a 0%-hit control; measure ns/op
    confidence: med
    risk: med

  - id: cheap-check-before-expensive
    title: Guard an expensive check with a cheaper necessary condition
    optimizes: cpu
    signal: an expensive predicate (regexp, full parse, lookup) is hot but mostly returns the
      negative/no-match result
    detect:
      - '\.MatchString\('
      - '\.Match\('
      - 'regexp\.'
    transform: "front the expensive predicate with a cheap necessary-condition test (substring /
      prefix / length, or a bloom filter) that rejects the common negative case before it runs"
    benchmark: realistic positive/negative ratio, plus a 100%-positive control to confirm no
      slow-path regression; measure ns/op
    confidence: med
    risk: low

  - id: branch-out-of-inner-loop
    title: Hoist a loop-invariant branch out of the inner loop
    optimizes: cpu
    signal: hot tight loop with an if/switch on a value that does not change across iterations
    detect: []   # needs to see the branch condition is loop-invariant
    transform: "split the loop on the invariant: if cond { for {A} } else { for {B} } instead of
      for { if cond {A} else {B} }"
    benchmark: loop over a representative length with the condition fixed; measure ns/op at -cpu=1
    confidence: low
    risk: low

  - id: soa-layout
    title: Split a struct slice into parallel arrays (struct-of-arrays)
    optimizes: cpu
    signal: a hot loop scans []Struct touching only one or two fields of a wide struct; memory-bound
      stalls / cache misses dominate
    detect: []   # needs to see a wide-struct slice scanned on few fields
    transform: "convert []Struct to a struct-of-slices (one []T per hot field) so the scan walks
      contiguous memory instead of striding over unused fields"
    benchmark: scan a representative-length collection touching only the hot field(s) at sizes that
      exceed L2 (so cache effects are real); measure ns/op
    confidence: med
    risk: med

  - id: sentinel-error-var
    title: Return a package-level error value instead of allocating per call
    optimizes: allocs
    signal: errors.New / fmt.Errorf hot in the alloc profile on a frequently-hit error path
      (expected/sentinel errors, validation rejections)
    detect:
      - 'errors\.New\('
      - 'fmt\.Errorf\('
    transform: "for a fixed (non-formatted) error, define a package-level var ErrX = errors.New(...)
      and return it; reserve fmt.Errorf for paths that actually interpolate"
    benchmark: drive the error path at scale; measure B/op and allocs/op
    confidence: high
    risk: low

  - id: timer-reuse-not-after
    title: Reuse a time.Timer instead of time.After in a loop
    optimizes: gc
    signal: time.After hot in alloc profile, or memory held by unfired timers in a long-lived select
      loop (a Timer is not GC'd until it fires)
    detect:
      - 'time\.After\('
    transform: "create one time.NewTimer outside the loop; each pass Stop() (drain if needed) and
      Reset() it, instead of time.After which leaks a Timer until it fires"
    benchmark: select loop re-arming the timeout each iteration over many iterations; measure allocs/op and B/op
    confidence: high
    risk: med

  - id: equalfold-no-lowercase
    title: Use strings.EqualFold instead of allocating lowercased copies
    optimizes: allocs
    signal: strings.ToLower / ToUpper allocations hot, feeding an == comparison for
      case-insensitive matching
    detect:
      - 'strings\.ToLower\([^)]*\)\s*==\s*strings\.ToLower'
      - 'strings\.ToUpper\([^)]*\)\s*==\s*strings\.ToUpper'
    transform: "replace strings.ToLower(a) == strings.ToLower(b) with strings.EqualFold(a, b), which
      compares case-insensitively without allocating"
    benchmark: case-insensitive compare over representative pairs; measure B/op, allocs/op, ns/op
    confidence: high
    risk: low

  - id: per-goroutine-rand
    title: Use a per-goroutine rand.Rand instead of the global rand functions
    optimizes: latency
    signal: runtime mutex / lock contention attributed to math/rand top-level functions under
      concurrency
    detect:
      - '\brand\.(Int|Intn|Int63|Float64|Read|Shuffle)\('
    transform: "give each goroutine/worker its own rand.New(rand.NewSource(seed)) (or math/rand/v2);
      the package-level functions serialize on one global mutex"
    benchmark: b.RunParallel hammering the RNG at -cpu=1 and -cpu=NumCPU, global vs per-goroutine; measure ns/op
    confidence: high
    risk: low

  - id: drain-http-body
    title: Drain and close the HTTP response body to enable connection reuse
    optimizes: latency
    signal: traces show a new TCP connect / TLS handshake on most outbound HTTP calls (no keep-alive
      reuse), or high connection churn to a downstream
    detect:
      - 'http\.(Get|Post|Do|Head)\('
      - '\.Body\.Close\(\)'
    transform: "before closing, drain the body (io.Copy(io.Discard, resp.Body)) so the transport can
      reuse the connection; an undrained body forces a new connection next time"
    benchmark: repeated requests to one host (vegeta/k6/fortio load test, not a microbench); measure
      connection-reuse ratio and per-request latency
    confidence: med
    risk: med   # local benchstat can't prove this; verdict is usually need_more_data (load-test it)

  # --- workload / query-shaped patterns (kind: workload) ---
  # Advisory: the bottleneck is the request shape, not the code. Detected from the request's
  # attributes, not source; the benchstat gate cannot validate it, so the analyst reports it
  # directly with the fix.

  - id: no-op-filter
    kind: workload
    title: A filter that matches everything adds no selectivity but still costs work
    optimizes: latency
    signal: the slow request carries an always-true filter (matches all values) that does not reduce
      what is scanned
    detect: []
    transform: "remove the always-true filter from the query; it is a query fix, not a code change"
    benchmark: advisory; compare the query with and without the filter
    confidence: high
    risk: low

  - id: oversized-query
    kind: workload
    title: A low-selectivity query scans far more than it needs
    optimizes: latency
    signal: the slow request scans a large amount of data with little selective filtering, often over
      a wide range, and is slow or times out
    detect: []
    transform: "narrow the range, add a selective filter, or reduce resolution; a query fix, not code"
    benchmark: advisory; compare end-to-end latency before/after narrowing
    confidence: med
    risk: low
